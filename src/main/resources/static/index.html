<style>
    body {
        font-family: Arial;
        margin: 20px;
    }

    input {
        margin: 5px;
        padding: 6px;
    }

    button {
        margin: 5px;
        padding: 6px;
        cursor: pointer;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
    }

    .status-offen { color: red; font-weight: bold; }
    .status-in-arbeit { color: orange; font-weight: bold; }
    .status-erledigt { color: green; font-weight: bold; }

    /* ================= MOBILE VIEW ================= */
    @media (max-width: 768px) {

        body {
            margin: 10px;
        }

        h2 {
            font-size: 18px;
        }

        input {
            width: 100%;
            margin: 5px 0;
        }

        button {
            width: 100%;
            margin: 5px 0;
        }

        table {
            border: 0;
        }

        thead {
            display: none; /* Kopfzeile weg */
        }

        tr {
            display: block;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            background: #fafafa;
        }

        td {
            display: flex;
            justify-content: space-between;
            border: none;
            border-bottom: 1px solid #eee;
            padding: 6px 0;
        }

        td:last-child {
            border-bottom: none;
        }

        td::before {
            font-weight: bold;
        }

        /* Labels für Aufgaben */
        #taskTable td:nth-child(1)::before { content: "ID: "; }
        #taskTable td:nth-child(2)::before { content: "Text: "; }
        #taskTable td:nth-child(3)::before { content: "Status: "; }
        #taskTable td:nth-child(4)::before { content: "Aktion: "; }

        /* Labels für Arbeitszeiten */
        #workTable td:nth-child(1)::before { content: "ID: "; }
        #workTable td:nth-child(2)::before { content: "Datum: "; }
        #workTable td:nth-child(3)::before { content: "Von: "; }
        #workTable td:nth-child(4)::before { content: "Bis: "; }
        #workTable td:nth-child(5)::before { content: "Dauer: "; }
        #workTable td:nth-child(6)::before { content: "Aktion: "; }

        button {
            font-size: 14px;
        }
    }
</style>
