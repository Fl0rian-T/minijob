<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Minijob Manager</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            display: none; /* Überschrift entfernt wie gewünscht */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            word-wrap: break-word;
        }

        th {
            background: #f5f5f5;
        }

        /* Aktionen Spalte */
        .actions-col {
            width: 180px;
        }

        /* Buttons */
        button {
            width: 100%;
            margin: 3px 0;
            padding: 6px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .edit-btn {
            background: #3498db;
            color: white;
        }

        /* Status Farben */
        .status-offen {
            background: #ffdddd;
        }

        .status-inarbeit {
            background: #ffe5cc;
        }

        .status-erledigt {
            background: #ddffdd;
        }

        /* Mobile */
        @media (max-width: 768px) {
            body {
                margin: 10px;
            }

            th, td {
                font-size: 13px;
                padding: 6px;
            }

            .actions-col {
                width: 140px;
            }

            button {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<h1>Minijob Manager</h1>

<table>
    <thead>
    <tr>
        <th>Aufgabe</th>
        <th>Status</th>
        <th>Zeit</th>
        <th class="actions-col">Aktionen</th>
    </tr>
    </thead>

    <tbody id="taskTable">
    <!-- Hier werden deine Aufgaben reingeladen -->
    </tbody>
</table>

<script>
    // Beispiel Daten (kannst du später durch Backend ersetzen)
    const tasks = [
        {name: "Regale auffüllen", status: "offen", time: "2h"},
        {name: "Kasse", status: "inarbeit", time: "1h"},
        {name: "Putzen", status: "erledigt", time: "3h"}
    ];

    function render() {
        const table = document.getElementById("taskTable");
        table.innerHTML = "";

        tasks.forEach((t, i) => {

            let statusClass = "";
            if (t.status === "offen") statusClass = "status-offen";
            if (t.status === "inarbeit") statusClass = "status-inarbeit";
            if (t.status === "erledigt") statusClass = "status-erledigt";

            table.innerHTML += `
                <tr class="${statusClass}">
                    <td>${t.name}</td>
                    <td>${t.status}</td>
                    <td>${t.time}</td>
                    <td class="actions-col">
                        <button class="edit-btn" onclick="editTask(${i})">Ändern</button>
                        <button class="delete-btn" onclick="deleteTask(${i})">Löschen</button>
                    </td>
                </tr>
            `;
        });
    }

    function deleteTask(i) {
        if (confirm("Wirklich löschen?")) {
            tasks.splice(i, 1);
            render();
        }
    }

    function editTask(i) {
        let newName = prompt("Neue Aufgabe:", tasks[i].name);
        if (newName) {
            tasks[i].name = newName;
            render();
        }
    }

    render();
</script>

</body>
</html>
